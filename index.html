<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lady Boss System 💛 | Animated Final Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("background.avif") no-repeat center center/cover;
            font-family: 'Segoe UI', 'Poppins', monospace;
            overflow: hidden;
            transition: transform 2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
        }

        body.zoomed {
            transform: scale(1.05);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            transition: opacity 2s ease;
            pointer-events: none;
            z-index: 2;
        }

        /* ---- GLOWING KNOB (pulsing like heart) ---- */
        .switch-container {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            cursor: grab;
            filter: drop-shadow(0 0 6px rgba(0,240,255,0.5));
        }

        .string {
            width: 3px;
            height: 180px;
            background: linear-gradient(145deg, #f5e6d3, #c0a16b);
            transform-origin: top;
            transition: height 0.03s linear;
            border-radius: 2px;
            box-shadow: 0 0 2px rgba(0,0,0,0.3);
        }

        .knob {
            width: 38px;
            height: 38px;
            background: radial-gradient(circle at 30% 30%, #ffd966, #ff9f4a);
            border-radius: 50%;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,215,0,0.6);
            cursor: grab;
            transform-origin: top center;
            transition: transform 0.02s linear, box-shadow 0.3s ease;
            position: relative;
            animation: knobPulse 1.2s infinite ease-in-out;
        }
        
        /* Glowing on/off like heart beat */
        @keyframes knobPulse {
            0% { 
                box-shadow: 0 0 0 0 rgba(255, 182, 193, 0.7), 0 0 0 2px rgba(255,215,0,0.6), 0 8px 18px rgba(0,0,0,0.3);
            }
            50% { 
                box-shadow: 0 0 0 12px rgba(255, 182, 193, 0.4), 0 0 0 4px #ffd966, 0 8px 20px rgba(255,100,100,0.6);
            }
            100% { 
                box-shadow: 0 0 0 0 rgba(255, 182, 193, 0), 0 0 0 2px rgba(255,215,0,0.6), 0 8px 18px rgba(0,0,0,0.3);
            }
        }
        
        .knob:active {
            cursor: grabbing;
        }
        
        .knob::after {
            content: "";
            position: absolute;
            top: 6px;
            left: 9px;
            width: 8px;
            height: 8px;
            background: rgba(255,255,200,0.9);
            border-radius: 50%;
        }

        /* panels */
        .screen {
            display: none;
            width: 90%;
            max-width: 780px;
            padding: 35px 30px;
            border-radius: 48px;
            background: rgba(10, 5, 20, 0.7);
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,182,193,0.3);
            text-align: center;
            color: #fff7f0;
            z-index: 15;
            animation: fadeGlow 1s ease;
        }

        @keyframes fadeGlow {
            0% { opacity: 0; transform: scale(0.96); backdrop-filter: blur(0px);}
            100% { opacity: 1; transform: scale(1); backdrop-filter: blur(16px);}
        }

        .typing {
            border-right: 2px solid #ffb6c1;
            white-space: pre-line;
            font-size: clamp(1.2rem, 4vw, 1.9rem);
            font-weight: 500;
            margin-bottom: 30px;
            font-family: monospace;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            letter-spacing: 0.3px;
            line-height: 1.4;
        }

        button {
            background: linear-gradient(115deg, #ffb347, #ff6b6b);
            border: none;
            color: #1e1a2f;
            padding: 12px 34px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
            font-family: inherit;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px #ffb6c1;
        }

        /* HEART - hidden during final message writing */
        .heart {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 38px;
            cursor: pointer;
            filter: drop-shadow(0 0 8px #ff6b8b);
            animation: beat 1.1s infinite ease;
            z-index: 18;
            transition: opacity 0.4s;
        }
        .heart.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        @keyframes beat {
            0%,100%{ transform: translateX(-50%) scale(1);}
            50%{ transform: translateX(-50%) scale(1.28); text-shadow: 0 0 12px #ff99aa;}
        }
        
        .secret {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdfb3;
            background: rgba(0,0,0,0.5);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.6s;
            white-space: nowrap;
            font-weight: 500;
            pointer-events: none;
            z-index: 19;
        }

        /* FINAL CARD - animated typing area, no password */
        #finalCard {
            display: none;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(18px);
            border-radius: 56px;
            border-left: 4px solid #ffb347;
            border-right: 4px solid #ffb6c1;
        }
        
        .final-typing-area {
            text-align: left;
            font-family: monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #fff0dd;
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 25px;
            margin: 15px 0;
            border-left: 3px solid #ffb6c1;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .final-typing-area span {
            display: inline;
        }
        
        .cursor-blink {
            display: inline-block;
            width: 2px;
            background: #ffb6c1;
            animation: blinkStep 0.9s infinite;
            margin-left: 2px;
        }
        
        @keyframes blinkStep {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .urdu {
            font-family: 'Noto Nastaliq Urdu', serif;
            font-size: 1.5rem;
            line-height: 1.7;
            color: #ffecb3;
            margin-top: 15px;
        }
        
        .final-title {
            font-size: 2rem;
            background: linear-gradient(135deg, #FFD966, #FFA07A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }
        
        /* particles */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
            animation: floatUp linear forwards;
            z-index: 1;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.7;}
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0;}
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" style="opacity:1"></div>

<!-- GLOWING KNOB (pulsing heart-beat style) -->
<div class="switch-container" id="switchHandle">
    <div class="string" id="stringEl"></div>
    <div class="knob" id="knobEl"></div>
</div>

<!-- MAIN MESSAGES -->
<div class="screen" id="mainScreen">
    <h1 id="textMessage" class="typing"></h1>
    <button onclick="advanceMessage()">✨ Continue ✨</button>
</div>

<!-- HEART & SECRET (will hide during final typing) -->
<div class="heart" id="heartIcon" onclick="revealSecretMsg()">💛</div>
<div class="secret" id="secretMsg">💎 You are more special than you think — keep shining 💎</div>

<!-- FINAL CARD (NO PASSWORD, animated typing for final message) -->
<div class="screen" id="finalCard">
    <div style="text-align: center;">
        <div class="final-title">💛 Happy Birthday, Lady Boss 💛</div>
        <div id="finalTypingContainer" class="final-typing-area"></div>
        <div id="finalUrduContainer" class="urdu" style="display: none;"></div>
        <div id="finalSignature" style="margin-top: 20px; font-style: italic; opacity: 0.9;"></div>
    </div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    // --------------------------------------------------------------
    // 1. REALISTIC STRING + SWING PHYSICS (glowing knob already pulsing via CSS)
    // --------------------------------------------------------------
    const knob = document.getElementById("knobEl");
    const stringDiv = document.getElementById("stringEl");
    let dragging = false;
    let startY = 0, pullOffset = 0;
    let startX = 0, angle = 0;
    let triggerStarted = false;

    const MAX_PULL = 130;
    const TRIGGER_THRESHOLD = 70;
    
    let swingAnimId = null;
    
    function updateVisuals() {
        let newHeight = 180 + Math.min(MAX_PULL, pullOffset);
        stringDiv.style.height = newHeight + "px";
        knob.style.transform = `translateY(${pullOffset}px) rotate(${angle}deg)`;
    }
    
    function startSwingOscillation(initialAngle, initialAngularVel) {
        if (swingAnimId) cancelAnimationFrame(swingAnimId);
        let ang = initialAngle;
        let angVel = initialAngularVel;
        const DAMP = 0.96;
        const GRAVITY_SWING = 0.48;
        function stepSwing() {
            let accel = -Math.sin(ang * Math.PI / 180) * GRAVITY_SWING;
            angVel += accel;
            angVel *= DAMP;
            ang += angVel;
            angle = Math.min(22, Math.max(-22, ang));
            updateVisuals();
            if (Math.abs(angVel) > 0.05 || Math.abs(angle) > 0.5) {
                swingAnimId = requestAnimationFrame(stepSwing);
            } else {
                angle = 0;
                swingAnimId = null;
                updateVisuals();
            }
        }
        stepSwing();
    }
    
    function snapBackVertical() {
        if (swingAnimId) cancelAnimationFrame(swingAnimId);
        let velY = pullOffset * 0.38;
        let posY = pullOffset;
        const DAMP_Y = 0.87;
        const RESTITUTION = 0.7;
        function stepVertical() {
            velY *= DAMP_Y;
            posY += velY;
            if (posY <= 0.5 && Math.abs(velY) < 0.3) {
                posY = 0;
                pullOffset = 0;
                updateVisuals();
                startSwingOscillation(angle * 0.6, (velY * -0.2) + (angle * 0.15));
                return;
            }
            if (posY < 0) {
                posY = 0;
                velY = -velY * RESTITUTION;
            }
            pullOffset = Math.min(MAX_PULL, Math.max(0, posY));
            updateVisuals();
            requestAnimationFrame(stepVertical);
        }
        stepVertical();
    }
    
    function onMouseDown(e) {
        e.preventDefault();
        dragging = true;
        if (swingAnimId) cancelAnimationFrame(swingAnimId);
        startY = e.clientY;
        startX = e.clientX;
        knob.style.cursor = "grabbing";
    }
    
    function onMouseMove(e) {
        if (!dragging) return;
        let dy = (e.clientY - startY) * 0.65;
        let rawPull = Math.max(0, Math.min(MAX_PULL, dy));
        pullOffset = rawPull;
        let dx = (e.clientX - startX) * 0.45;
        angle = Math.max(-20, Math.min(20, dx));
        updateVisuals();
    }
    
    function onMouseUp(e) {
        if (!dragging) return;
        dragging = false;
        knob.style.cursor = "grab";
        let triggered = (pullOffset >= TRIGGER_THRESHOLD);
        if (triggered && !triggerStarted) {
            triggerStarted = true;
            startSequence();
            snapBackVertical();
        } else {
            snapBackVertical();
        }
    }
    
    knob.addEventListener("mousedown", onMouseDown);
    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseup", onMouseUp);
    
    // touch events
    knob.addEventListener("touchstart", (e) => {
        e.preventDefault();
        let touch = e.touches[0];
        startY = touch.clientY;
        startX = touch.clientX;
        dragging = true;
        if (swingAnimId) cancelAnimationFrame(swingAnimId);
        knob.style.cursor = "grabbing";
    });
    window.addEventListener("touchmove", (e) => {
        if (!dragging) return;
        let touch = e.touches[0];
        let dy = (touch.clientY - startY) * 0.65;
        pullOffset = Math.max(0, Math.min(MAX_PULL, dy));
        let dx = (touch.clientX - startX) * 0.45;
        angle = Math.max(-20, Math.min(20, dx));
        updateVisuals();
        e.preventDefault();
    });
    window.addEventListener("touchend", () => {
        if (!dragging) return;
        dragging = false;
        knob.style.cursor = "grab";
        let triggered = (pullOffset >= TRIGGER_THRESHOLD);
        if (triggered && !triggerStarted) {
            triggerStarted = true;
            startSequence();
            snapBackVertical();
        } else {
            snapBackVertical();
        }
    });
    
    pullOffset = 0;
    angle = 0;
    updateVisuals();
    
    // --------------------------------------------------------------
    // 2. MESSAGE SEQUENCE (typing)
    // --------------------------------------------------------------
    const messageSteps = [
        "Welcome Dear. Pasandida Aurat 💛",
        "I have been luckier to know you than MXene | Ion Interaction | Energy Systems from 6th July, 2025.\n\nI want to take a moment to say:"
    ];
    let msgIndex = 0;
    const textElem = document.getElementById("textMessage");
    let typingInterval = null;
    
    function typeMessage(text, speed = 42) {
        if (typingInterval) clearInterval(typingInterval);
        textElem.innerHTML = "";
        let i = 0;
        typingInterval = setInterval(() => {
            if (i < text.length) {
                textElem.innerHTML += text[i];
                i++;
            } else {
                clearInterval(typingInterval);
                typingInterval = null;
            }
        }, speed);
    }
    
    function advanceMessage() {
        if (msgIndex + 1 < messageSteps.length) {
            msgIndex++;
            typeMessage(messageSteps[msgIndex]);
        } else if (msgIndex + 1 === messageSteps.length) {
            // close main screen and open final card with ANIMATED TYPING (password removed)
            document.getElementById("mainScreen").style.display = "none";
            const finalCardDiv = document.getElementById("finalCard");
            finalCardDiv.style.display = "block";
            finalCardDiv.style.animation = "fadeGlow 0.8s ease";
            
            // HIDE HEART ICON while final message is being written
            const heartIcon = document.getElementById("heartIcon");
            heartIcon.classList.add("hidden");
            
            // Start animated typing for final long message (no password required)
            startFinalMessageTyping();
        }
    }
    
    // --------------------------------------------------------------
    // 3. FINAL MESSAGE WITH TYPING ANIMATION (elegant, no password)
    // --------------------------------------------------------------
    const finalFullMessage = `✨ Numbers 6:24-26 ✨
“The LORD bless you and keep you;
the LORD make his face shine upon you
and be gracious to you;
the LORD turn his face toward you
and give you peace.”

🌟 Wishing you a year bursting with discoveries in MXenes, ion interactions, and energy systems. May your research break new ground, fuel innovation, and shape a sustainable future. Your brilliance inspires everyone around you!

Happiest Birthday Once Again — the universe shines brighter because of you! 💛`;
    
    const urduMessage = `خدا آپ کے ساتھ ہو… ہر خواب شرمندہ تعبیر ہو 💛`;
    const signatureLine = `💫 With endless admiration & respect 💫`;
    
    let finalTypingActive = false;
    let finalTypingInterval = null;
    let finalCharIndex = 0;
    let finalContainer = null;
    let urduContainer = null;
    let signatureContainer = null;
    
    function startFinalMessageTyping() {
        finalContainer = document.getElementById("finalTypingContainer");
        const urduElem = document.getElementById("finalUrduContainer");
        const signatureElem = document.getElementById("finalSignature");
        
        if (!finalContainer) return;
        finalContainer.innerHTML = "";
        urduElem.style.display = "none";
        signatureElem.innerHTML = "";
        
        finalCharIndex = 0;
        finalTypingActive = true;
        
        function typeNextChar() {
            if (!finalTypingActive) return;
            if (finalCharIndex < finalFullMessage.length) {
                finalContainer.innerHTML += finalFullMessage[finalCharIndex];
                finalCharIndex++;
                finalTypingInterval = setTimeout(typeNextChar, 28);
                // Auto scroll to bottom
                finalContainer.scrollTop = finalContainer.scrollHeight;
            } else {
                // message done, now show urdu with typing effect
                clearTimeout(finalTypingInterval);
                typeUrduWithAnimation();
            }
        }
        typeNextChar();
    }
    
    function typeUrduWithAnimation() {
        const urduElem = document.getElementById("finalUrduContainer");
        const signatureElem = document.getElementById("finalSignature");
        urduElem.style.display = "block";
        urduElem.innerHTML = "";
        let urduIndex = 0;
        function typeUrdu() {
            if (urduIndex < urduMessage.length) {
                urduElem.innerHTML += urduMessage[urduIndex];
                urduIndex++;
                setTimeout(typeUrdu, 35);
            } else {
                // finally type signature line with slight delay
                setTimeout(() => {
                    let sigIndex = 0;
                    function typeSignature() {
                        if (sigIndex < signatureLine.length) {
                            signatureElem.innerHTML += signatureLine[sigIndex];
                            sigIndex++;
                            setTimeout(typeSignature, 28);
                        } else {
                            // All done, show the heart again after final message is fully written
                            const heartIcon = document.getElementById("heartIcon");
                            heartIcon.classList.remove("hidden");
                            // Add a little extra sparkle
                            createCelebrationSparkles();
                        }
                    }
                    typeSignature();
                }, 180);
            }
        }
        typeUrdu();
    }
    
    function createCelebrationSparkles() {
        for(let i = 0; i < 30; i++) {
            setTimeout(() => {
                let spark = document.createElement("div");
                spark.style.position = "absolute";
                spark.style.width = "8px";
                spark.style.height = "8px";
                spark.style.background = `radial-gradient(circle, #ffb6c1, #ffd966)`;
                spark.style.borderRadius = "50%";
                spark.style.left = Math.random() * 100 + "%";
                spark.style.top = Math.random() * 80 + 10 + "%";
                spark.style.pointerEvents = "none";
                spark.style.zIndex = "999";
                spark.style.animation = "sparkleFade 1s ease-out forwards";
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }, i * 60);
        }
    }
    
    // Add sparkle keyframe
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `@keyframes sparkleFade { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.8); } }`;
    document.head.appendChild(styleSheet);
    
    // --------------------------------------------------------------
    // 4. START SEQUENCE (flicker, zoom, music, particles)
    // --------------------------------------------------------------
    function startSequence() {
        if (window.sequenceStarted) return;
        window.sequenceStarted = true;
        const switchContainer = document.getElementById("switchHandle");
        switchContainer.style.transition = "opacity 1s";
        switchContainer.style.opacity = "0";
        setTimeout(() => {
            switchContainer.style.display = "none";
        }, 1000);
        
        let flashCount = 0;
        let flickerInterval = setInterval(() => {
            document.body.style.filter = flashCount % 2 === 0 ? "brightness(0.55)" : "brightness(1)";
            flashCount++;
            if (flashCount > 8) {
                clearInterval(flickerInterval);
                document.body.style.filter = "";
                document.getElementById("overlay").style.opacity = "0";
                document.body.classList.add("zoomed");
                document.getElementById("mainScreen").style.display = "block";
                let music = document.getElementById("bgMusic");
                music.play().catch(e => console.log("autoplay blocked"));
                typeMessage(messageSteps[0]);
                createParticleField();
            }
        }, 130);
    }
    
    function createParticleField() {
        setInterval(() => {
            let particle = document.createElement("div");
            particle.classList.add("particle");
            particle.style.left = Math.random() * 100 + "%";
            particle.style.width = Math.random() * 8 + 3 + "px";
            particle.style.height = particle.style.width;
            particle.style.background = `radial-gradient(circle, ${Math.random() > 0.6 ? '#ffb6c1' : '#00f0ff'}, #ffd966)`;
            particle.style.animationDuration = 8 + Math.random() * 12 + "s";
            particle.style.opacity = Math.random() * 0.7 + 0.2;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 14000);
        }, 380);
    }
    
    function revealSecretMsg() {
        const secretDiv = document.getElementById("secretMsg");
        secretDiv.style.opacity = "1";
        setTimeout(() => {
            secretDiv.style.opacity = "0";
        }, 4000);
    }
    
    // Audio init after first user interaction if needed
    document.body.addEventListener("click", function initAudio() {
        let music = document.getElementById("bgMusic");
        if(music && music.paused && window.sequenceStarted) {
            music.play().catch(()=>{});
        }
    }, { once: true });
    
    window.sequenceStarted = false;
    
    // Ensure heart doesn't reappear before final message fully typed
    // Additional: remove password prompt completely
    console.log("Lady Boss — Glowing Knob + Animated Final Message ✨");
</script>
</body>
</html>
